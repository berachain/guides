# Public snapshots - snapshots.bepolia.berachain.com
server {
    listen 80;
    listen [::]:80;
    server_name snapshots.bepolia.berachain.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name snapshots.bepolia.berachain.com;

    ssl_certificate /etc/letsencrypt/live/snapshots.bepolia.berachain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/snapshots.bepolia.berachain.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers off;

    access_log /var/log/nginx/bera-bepolia-access.log;
    error_log /var/log/nginx/bera-bepolia-error.log;

    root /srv/snapshots/public;
    index index.html;

    autoindex on;
    autoindex_exact_size off;
    autoindex_localtime on;

    # Public snapshot directories (no auth)
    location / {
        try_files $uri $uri/ =404;
    }

    # Metrics endpoints (HTTP basic auth — user: bops)
    # htpasswd file managed by Ansible; generate with:
    #   htpasswd -bc /etc/nginx/auth/metrics.htpasswd bops amazeballs

    location ~ ^/metrics/node-exporter(/.*)?$ {
        auth_basic "Metrics Access";
        auth_basic_user_file /etc/nginx/auth/metrics.htpasswd;
        rewrite ^/metrics/node-exporter(/.*)?$ /metrics$1 break;
        proxy_pass http://127.0.0.1:9100;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # reth-pruned (testnet/bepolia): CL=43003, EL=43013
    location ~ ^/metrics/reth-pruned-cl(/.*)?$ {
        auth_basic "Metrics Access";
        auth_basic_user_file /etc/nginx/auth/metrics.htpasswd;
        rewrite ^/metrics/reth-pruned-cl(/.*)?$ /metrics$1 break;
        proxy_pass http://127.0.0.1:43003;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ~ ^/metrics/reth-pruned-el(/.*)?$ {
        auth_basic "Metrics Access";
        auth_basic_user_file /etc/nginx/auth/metrics.htpasswd;
        rewrite ^/metrics/reth-pruned-el(/.*)?$ /metrics$1 break;
        proxy_pass http://127.0.0.1:43013;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # reth-archive (testnet/bepolia): CL=30023, EL=30033
    location ~ ^/metrics/reth-archive-cl(/.*)?$ {
        auth_basic "Metrics Access";
        auth_basic_user_file /etc/nginx/auth/metrics.htpasswd;
        rewrite ^/metrics/reth-archive-cl(/.*)?$ /metrics$1 break;
        proxy_pass http://127.0.0.1:30023;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ~ ^/metrics/reth-archive-el(/.*)?$ {
        auth_basic "Metrics Access";
        auth_basic_user_file /etc/nginx/auth/metrics.htpasswd;
        rewrite ^/metrics/reth-archive-el(/.*)?$ /metrics$1 break;
        proxy_pass http://127.0.0.1:30033;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
