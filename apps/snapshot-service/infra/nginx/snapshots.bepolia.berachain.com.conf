# Metrics-only HTTP vhost — no redirect to HTTPS
# Auth: HTTP Basic (bops / amazeballs)
server {
    listen 80;
    listen [::]:80;
    server_name bepolia.snapshots.berachain.com;

    root /srv/snapshots/public;
    index index.html;

    # Dashboard served over HTTP (no redirect) for mixed-content compatibility
    location = /dboard {
        default_type text/html;
    }

    location ~ ^/metrics/node-exporter {
        auth_basic "Metrics Access";
        auth_basic_user_file /etc/nginx/auth/metrics.htpasswd;
        rewrite ^ /metrics break;
        proxy_pass http://127.0.0.1:9100;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location ~ ^/metrics/reth-archive-cl {
        auth_basic "Metrics Access";
        auth_basic_user_file /etc/nginx/auth/metrics.htpasswd;
        rewrite ^ /metrics break;
        proxy_pass http://127.0.0.1:30023;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location ~ ^/metrics/reth-archive-el {
        auth_basic "Metrics Access";
        auth_basic_user_file /etc/nginx/auth/metrics.htpasswd;
        rewrite ^ /metrics break;
        proxy_pass http://127.0.0.1:30033;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location ~ ^/metrics/reth-pruned-cl {
        auth_basic "Metrics Access";
        auth_basic_user_file /etc/nginx/auth/metrics.htpasswd;
        rewrite ^ /metrics break;
        proxy_pass http://127.0.0.1:43003;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location ~ ^/metrics/reth-pruned-el {
        auth_basic "Metrics Access";
        auth_basic_user_file /etc/nginx/auth/metrics.htpasswd;
        rewrite ^ /metrics break;
        proxy_pass http://127.0.0.1:43013;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    server_name localhost bepolia.snapshots.berachain.com snapshots.bepolia.berachain.com 94.130.22.245;

    access_log /var/log/nginx/snapshots-bepolia-dryrun-access.log;
    error_log /var/log/nginx/snapshots-bepolia-dryrun-error.log;

    root /srv/snapshots/public;
    index index.html;

    autoindex on;
    autoindex_exact_size off;
    autoindex_localtime on;

    location = /dboard {
        default_type text/html;
    }

    location / {
        try_files $uri $uri/ =404;
    }

    listen [::]:443 ssl ipv6only=on; # managed by Certbot
    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/bepolia.snapshots.berachain.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/bepolia.snapshots.berachain.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot


    # Metrics endpoints (HTTP basic auth — user: bops)
    location ~ ^/metrics/node-exporter {
        auth_basic "Metrics Access";
        auth_basic_user_file /etc/nginx/auth/metrics.htpasswd;
        rewrite ^ /metrics break;
        proxy_pass http://127.0.0.1:9100;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # reth-archive (testnet/bepolia): CL=30023, EL=30033
    location ~ ^/metrics/reth-archive-cl {
        auth_basic "Metrics Access";
        auth_basic_user_file /etc/nginx/auth/metrics.htpasswd;
        rewrite ^ /metrics break;
        proxy_pass http://127.0.0.1:30023;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ~ ^/metrics/reth-archive-el {
        auth_basic "Metrics Access";
        auth_basic_user_file /etc/nginx/auth/metrics.htpasswd;
        rewrite ^ /metrics break;
        proxy_pass http://127.0.0.1:30033;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # reth-pruned (testnet/bepolia): CL=43003, EL=43013
    location ~ ^/metrics/reth-pruned-cl {
        auth_basic "Metrics Access";
        auth_basic_user_file /etc/nginx/auth/metrics.htpasswd;
        rewrite ^ /metrics break;
        proxy_pass http://127.0.0.1:43003;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ~ ^/metrics/reth-pruned-el {
        auth_basic "Metrics Access";
        auth_basic_user_file /etc/nginx/auth/metrics.htpasswd;
        rewrite ^ /metrics break;
        proxy_pass http://127.0.0.1:43013;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

}

server {
    if ($host = bepolia.snapshots.berachain.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    listen [::]:80;
    server_name localhost bepolia.snapshots.berachain.com snapshots.bepolia.berachain.com 94.130.22.245;
    return 404; # managed by Certbot
}
