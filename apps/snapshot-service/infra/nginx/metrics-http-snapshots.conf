# Metrics-only HTTP vhost — no redirect to HTTPS
# Auth: HTTP Basic (bops / amazeballs)
# Installed as: /etc/nginx/sites-available/0-metrics-http.conf (symlinked to sites-enabled)
# Must sort before bera-main to win the port-80 server_name match.
server {
    listen 80;
    listen [::]:80;
    server_name snapshots.berachain.com;

    # Only handle /metrics/* — everything else falls through to bera-main
    location ~ ^/metrics/node-exporter {
        auth_basic "Metrics Access";
        auth_basic_user_file /etc/nginx/auth/metrics.htpasswd;
        rewrite ^ /metrics break;
        proxy_pass http://127.0.0.1:9100;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # reth-pruned (mainnet): CL=42103, EL=42113
    location ~ ^/metrics/reth-pruned-cl {
        auth_basic "Metrics Access";
        auth_basic_user_file /etc/nginx/auth/metrics.htpasswd;
        rewrite ^ /metrics break;
        proxy_pass http://127.0.0.1:42103;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location ~ ^/metrics/reth-pruned-el {
        auth_basic "Metrics Access";
        auth_basic_user_file /etc/nginx/auth/metrics.htpasswd;
        rewrite ^ /metrics break;
        proxy_pass http://127.0.0.1:42113;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # reth-archive (mainnet): CL=42303, EL=42313
    location ~ ^/metrics/reth-archive-cl {
        auth_basic "Metrics Access";
        auth_basic_user_file /etc/nginx/auth/metrics.htpasswd;
        rewrite ^ /metrics break;
        proxy_pass http://127.0.0.1:42303;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location ~ ^/metrics/reth-archive-el {
        auth_basic "Metrics Access";
        auth_basic_user_file /etc/nginx/auth/metrics.htpasswd;
        rewrite ^ /metrics break;
        proxy_pass http://127.0.0.1:42313;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Redirect everything else to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}
